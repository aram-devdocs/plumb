# cargo-deny configuration.
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# Plumb has zero tolerance for unreviewed license drift, unknown registries,
# or unresolved security advisories. Every allow-list here is intentional.

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

# ── Advisories ────────────────────────────────────────────────────────────
# No suppressions. A real advisory gets a fix or a PR, never an `ignore` entry.
[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

# ── Licenses ──────────────────────────────────────────────────────────────
# Explicit allow-list. GPL / AGPL / LGPL are not compatible with MIT OR
# Apache-2.0 downstream users; they stay out of the tree.
[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ── Bans ──────────────────────────────────────────────────────────────────
# `multiple-versions = warn` — we surface it, but don't block unrelated work
# on transitive duplication we can't fix. Direct duplicates across workspace
# crates are always a blocker — enforced via cargo-deny's `workspace` check.
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # Superseded or unmaintained crates we refuse to accept even transitively.
    { name = "openssl", reason = "prefer rustls — no OpenSSL dependency in the tree" },
]
skip = []
skip-tree = []

# ── Sources ───────────────────────────────────────────────────────────────
# Only crates.io is accepted. Git sources and private registries require an
# explicit allow entry and an ADR.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
