# Repo-local cargo config.
#
# The `justfile` owns the day-to-day task surface. The one alias here is
# `cargo xtask`, which the cargo convention establishes.

[alias]
xtask = "run --package xtask --quiet --"

[env]
# Default tracing filter. Users can still override with RUST_LOG in their shell.
RUST_LOG = { value = "plumb=info,warn", force = false }

[build]
# Leave rustflags to the workspace lints table. Setting -D here would apply
# to proc-macro crates and dependencies too, which is not what we want.

[net]
# Default is true on recent cargo, but pin it so CI on older workers behaves.
git-fetch-with-cli = true
