name: Feature request
description: Propose a new rule, output format, MCP tool, or CLI flag.
title: "feat: "
labels: ["kind:feat", "needs-triage"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who hits it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Plumb do? Be concrete — API shape, flag name, rule id.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: scope
    attributes:
      label: Scope / non-goals
      description: What should this explicitly NOT do?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core (rule engine / types)
        - cli
        - mcp
        - cdp (browser driver)
        - config
        - format (output)
        - docs
        - ci
    validations:
      required: true
