name: Install smoke test

# Verifies that each install channel produces a working `plumb` binary
# across platforms. Runs weekly and on every release tag.
#
# Matrix: {cargo, brew, npm, curl} x {ubuntu, macos, windows}.
# Brew and npm channels are gated — they skip until the external
# prerequisites (plumb-dev org, homebrew-tap repo, npm scope) exist.
# See dist-workspace.toml and docs/src/ci/release-prep.md for details.
#
# Non-gated failures open or update a single tracking issue so the team
# gets notified without duplicate noise.

on:
  schedule:
    - cron: "15 4 * * 1" # Weekly, Monday 04:15 UTC
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Determine tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${{ github.ref_name }}"
          else
            tag="$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName 2>/dev/null || true)"
          fi
          if [[ -z "$tag" ]]; then
            echo "::warning::No release tag found — skipping smoke tests."
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

  smoke:
    name: "${{ matrix.channel }} / ${{ matrix.os }}"
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.gated }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── cargo ───────────────────────────────────────────────
          - channel: cargo
            os: ubuntu-latest
            gated: false
          - channel: cargo
            os: macos-latest
            gated: false
          - channel: cargo
            os: windows-latest
            gated: false

          # ── curl (install script) ───────────────────────────────
          - channel: curl
            os: ubuntu-latest
            gated: false
          - channel: curl
            os: macos-latest
            gated: false
          - channel: curl
            os: windows-latest
            gated: false

          # ── brew (gated — no tap yet) ───────────────────────────
          - channel: brew
            os: ubuntu-latest
            gated: true
          - channel: brew
            os: macos-latest
            gated: true

          # ── npm (gated — no scope yet) ──────────────────────────
          - channel: npm
            os: ubuntu-latest
            gated: true
          - channel: npm
            os: macos-latest
            gated: true
          - channel: npm
            os: windows-latest
            gated: true

    steps:
      - name: Skip gated channel
        if: matrix.gated
        run: |
          echo "::notice::${{ matrix.channel }} is gated — external prerequisites not yet available. Skipping."
          exit 0

      # ── cargo install ─────────────────────────────────────────
      - name: Install via cargo
        if: "!matrix.gated && matrix.channel == 'cargo'"
        timeout-minutes: 45
        shell: bash
        run: |
          cargo install plumb-cli --version "${{ needs.resolve-tag.outputs.version }}" --locked

      # ── curl / install script ─────────────────────────────────
      - name: Install via curl (unix)
        if: "!matrix.gated && matrix.channel == 'curl' && runner.os != 'Windows'"
        shell: bash
        env:
          INSTALLER_URL: "https://github.com/${{ github.repository }}/releases/download/${{ needs.resolve-tag.outputs.tag }}/plumb-installer.sh"
        run: |
          curl -LsSf "$INSTALLER_URL" | sh

      - name: Install via curl (windows)
        if: "!matrix.gated && matrix.channel == 'curl' && runner.os == 'Windows'"
        shell: pwsh
        env:
          INSTALLER_URL: "https://github.com/${{ github.repository }}/releases/download/${{ needs.resolve-tag.outputs.tag }}/plumb-installer.ps1"
        run: |
          irm "$env:INSTALLER_URL" | iex

      # ── brew ──────────────────────────────────────────────────
      - name: Install via brew
        if: "!matrix.gated && matrix.channel == 'brew'"
        shell: bash
        run: |
          brew install plumb-dev/tap/plumb

      # ── npm ───────────────────────────────────────────────────
      - name: Install via npm
        if: "!matrix.gated && matrix.channel == 'npm'"
        shell: bash
        run: |
          npm install -g @plumb/cli

      # ── Verify ────────────────────────────────────────────────
      - name: Verify plumb
        if: "!matrix.gated"
        shell: bash
        run: |
          # On Windows the installer may update PATH outside bash's view.
          # Refresh and show diagnostics so PATH failures are explicit.
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export PATH="$USERPROFILE/.cargo/bin:$LOCALAPPDATA/Programs/plumb/bin:$PATH"
            echo "--- PATH diagnostic ---"
            which plumb || { echo "::error::plumb not found on PATH"; where plumb 2>/dev/null || true; echo "PATH=$PATH"; exit 1; }
          fi
          echo "--- plumb --version ---"
          plumb --version
          echo "--- plumb lint plumb-fake://hello ---"
          rc=0; plumb lint plumb-fake://hello || rc=$?
          if [[ "$rc" -ne 0 && "$rc" -ne 3 ]]; then
            echo "::error::plumb lint exited with unexpected code $rc"
            exit 1
          fi

  report:
    name: Report failures
    needs: [resolve-tag, smoke]
    if: always() && needs.resolve-tag.outputs.tag != '' && needs.smoke.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPORT_REPO: ${{ github.repository }}
      REPORT_TAG: ${{ needs.resolve-tag.outputs.tag }}
      REPORT_EVENT_NAME: ${{ github.event_name }}
      REPORT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Assert report scripts use env indirection
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          lines = Path(".github/workflows/install-smoke.yml").read_text().splitlines()
          direct_expr = re.compile(r"\$\{\{\s*(github\.|needs\.resolve-tag\.)")

          in_report = False
          current_step = None
          in_run = False
          run_indent = None
          bad_lines = []

          for lineno, line in enumerate(lines, start=1):
              stripped = line.lstrip()
              indent = len(line) - len(stripped)

              if indent == 2 and stripped.endswith(":"):
                  in_report = stripped == "report:"
                  current_step = None
                  in_run = False
                  run_indent = None
                  continue

              if not in_report:
                  continue

              if indent == 6 and stripped.startswith("- name:"):
                  current_step = stripped[len("- name:"):].strip()
                  in_run = False
                  run_indent = None
                  continue

              if indent == 8 and stripped.startswith("run:"):
                  in_run = True
                  run_indent = indent
                  continue

              if in_run:
                  if stripped and indent <= run_indent:
                      in_run = False
                      run_indent = None
                  elif direct_expr.search(line):
                      bad_lines.append((lineno, current_step or "<unknown>", line.strip()))

          if bad_lines:
              for lineno, step_name, content in bad_lines:
                  print(
                      f"{lineno}: report step {step_name!r} contains direct workflow interpolation: {content}",
                      file=sys.stderr,
                  )
              sys.exit(1)
          PY

      - name: Ensure install-smoke label exists
        run: |
          gh label create install-smoke \
            --repo "$REPORT_REPO" \
            --description "Auto-created by the install-smoke workflow" \
            --color "D93F0B" 2>/dev/null || true

      - name: Create or update tracking issue
        run: |
          repo="$REPORT_REPO"
          title="Install smoke test failure ($REPORT_TAG)"
          run_url="$REPORT_RUN_URL"

          body="$(cat <<EOF
          ## Install smoke test failure

          **Tag:** \`$REPORT_TAG\`
          **Run:** $run_url
          **Triggered by:** $REPORT_EVENT_NAME

          One or more non-gated install channels failed. Check the workflow
          run linked above for per-job logs.

          _This issue was created automatically by the install-smoke workflow._
          EOF
          )"

          # Label-based lookup is consistent (no search-index delay).
          existing="$(gh issue list --repo "$repo" --state open \
            --label install-smoke \
            --json number -q '.[0].number' 2>/dev/null || true)"

          if [[ -n "$existing" ]]; then
            echo "Updating existing issue #$existing"
            gh issue comment "$existing" --repo "$repo" \
              --body "New failure for tag \`$REPORT_TAG\`: $run_url"
          else
            echo "Creating new tracking issue"
            gh issue create --repo "$repo" \
              --title "$title" \
              --body "$body" \
              --label install-smoke
          fi
