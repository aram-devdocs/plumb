name: e2e-sites

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-sites-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  matrix:
    name: ${{ matrix.framework }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    # Next.js leg is advisory until the fixture is converted to a pure
    # static export. chromiumoxide 0.9.1 (PR #232) fixed the WebSocket
    # 'Invalid message' bug, but Next.js's client-side hydration still
    # produces non-deterministic computed-style timing across runs on
    # Linux + Windows. macOS happens to be stable. Tracking the static
    # fixture rewrite as aram-devdocs/plumb#233.
    continue-on-error: ${{ matrix.framework == 'nextjs' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        framework:
          - html-css
          - tailwind-html
          - react-vite
          - vue
          - angular
          - nextjs
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-sites

      - uses: extractions/setup-just@v4

      - name: Set up Node 20
        if: matrix.framework != 'html-css'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e-sites/${{ matrix.framework }}/package-lock.json

      - name: Prepare Chrome sandbox (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo bash scripts/ci-chrome-sandbox.sh

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Build the fixture
        working-directory: e2e-sites/${{ matrix.framework }}
        shell: bash
        run: just build

      - name: Build plumb (release)
        run: cargo build --release -p plumb-cli

      - name: Run the e2e harness for ${{ matrix.framework }}
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        shell: bash
        run: |
          cargo run --release -p plumb-e2e -- \
            --site "${{ matrix.framework }}" \
            --no-build \
            --plumb-bin target/release/plumb \
            --chrome-path "$CHROME_PATH"
