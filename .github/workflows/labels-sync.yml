name: labels-sync

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/labels-sync.yml
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync:
    name: Sync issue labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
