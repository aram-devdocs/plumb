name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  preflight:
    name: Preflight (fmt, clippy, check, agents-md)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: check-agents-md
        run: bash scripts/check-agents-md.sh
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo check
        run: cargo check --workspace --all-targets --all-features

  test:
    name: Test (${{ matrix.os }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: cargo nextest
        run: cargo nextest run --workspace --all-features --profile ci
      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  msrv:
    name: MSRV (1.95)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-features

  determinism:
    name: Determinism
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - name: just determinism-check
        run: just determinism-check

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: cargo llvm-cov
        run: cargo llvm-cov --workspace --all-features --lcov --output-path coverage.lcov
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          fail_ci_if_error: false

  size-guard:
    name: Size guard (<25 MiB)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p plumb-cli
      - name: Strip and measure
        run: |
          strip target/release/plumb || true
          bytes=$(wc -c < target/release/plumb | tr -d ' ')
          limit=26214400
          echo "Binary size: $bytes bytes (limit $limit)."
          if [ "$bytes" -ge "$limit" ]; then
            echo "::error::Binary size $bytes exceeds 25 MiB ($limit)."
            exit 1
          fi

  deny:
    name: cargo-deny
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  docs:
    name: Docs (build, no deploy)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"
      - name: mdbook build
        run: mdbook build
      - name: cargo doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings
      - uses: actions/upload-artifact@v4
        with:
          name: book
          path: book/
          if-no-files-found: ignore
