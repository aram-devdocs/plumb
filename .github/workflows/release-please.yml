name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: "Force-publish this existing tag to crates.io (e.g. v0.0.3). Skips the release-please step."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  crates-io:
    name: Publish to crates.io
    needs: release-please
    # Run when release-please cut a new tag, OR when an operator passes
    # `publish_tag` via workflow_dispatch to retry an existing tag.
    if: |
      needs.release-please.outputs.release_created == 'true' ||
      inputs.publish_tag != ''
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.publish_tag || needs.release-please.outputs.tag_name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Refresh Cargo.lock for bumped workspace deps
        # release-please bumps the workspace-dep `version` fields in
        # Cargo.toml but does not touch Cargo.lock, so `cargo publish
        # --locked` rejects the package. `cargo update --workspace`
        # regenerates lockfile entries for the workspace crates only;
        # external dep versions stay pinned to whatever was in main.
        run: cargo update --workspace
      - name: Publish crates (bottom-up dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Bottom-up publish order matching the dependency hierarchy:
          #   core (no internal deps)
          #   → format (core)
          #   → cdp (core)
          #   → config (core)
          #   → codegen (core, config)
          #   → mcp (core, format, cdp, config)
          #   → cli (all)
          CRATES=(plumb-core plumb-format plumb-cdp plumb-config plumb-codegen plumb-mcp plumb-cli)
          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            echo "▸ dry-run $crate"
            cargo publish -p "$crate" --dry-run --locked
            echo "▸ publish $crate"
            cargo publish -p "$crate" --locked
            echo "::endgroup::"
            # Wait for the crates.io index to sync so the next crate's
            # dependency on this one resolves.
            if [ "$crate" != "plumb-cli" ]; then
              echo "⏳ waiting 30s for index sync…"
              sleep 30
            fi
          done
