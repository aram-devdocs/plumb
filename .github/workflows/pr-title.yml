name: PR title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  conventional:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            style
            revert
          scopes: |
            core
            cli
            mcp
            cdp
            config
            format
            docs
            ci
            deps
          requireScope: false
          subjectPattern: ^[^A-Z].+
          subjectPatternError: |
            The PR title subject (the part after the colon) must start with a lowercase letter.
          wip: true
