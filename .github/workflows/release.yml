name: release

# Triggered when release-please creates a tag. Builds cross-platform
# binaries via cargo-dist, generates installers, and attaches artifacts
# to the GitHub Release.
#
# This workflow is a hand-authored version of what `cargo dist init`
# would generate. It stays in sync with `dist-workspace.toml`. Re-run
# `cargo dist generate` locally and diff before editing.
#
# Cargo publish, curl installers, Homebrew tap publish, and npm publish are the non-manual release channels active in this repo today.
# The Homebrew formula push (to `aram-devdocs/homebrew-plumb` via the
# `HOMEBREW_TAP_TOKEN` repo secret) and the unscoped `plumb-cli` npm
# publish (via the `NPM_TOKEN` repo secret) are hand-authored here as
# the `publish-homebrew` and `publish-npm` jobs; cargo-dist's built-in
# publish-jobs require its auto-generated workflow, which we do not use.
# `dist-workspace.toml` enables npm by listing it in `installers` with
# `npm-scope` left unset; that emits `plumb-cli-npm-package.tar.gz` and
# publishes under the cargo package name (`plumb-cli`). Public install:
# `npm i -g plumb-cli`.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Manual fallback. release-please creates tags using GITHUB_TOKEN, which
  # GitHub will NOT use to trigger downstream `push` workflows (loop guard).
  # Use this dispatch (or set RELEASE_PLEASE_TOKEN to a PAT in
  # release-please.yml) when an automated tag push needs cargo-dist.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.0.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  # Resolves to the dispatch input on workflow_dispatch, or the pushed
  # tag name on tag push. Used as the cargo-dist `--tag` arg and the
  # checkout `ref` everywhere below.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ env.RELEASE_TAG }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: cargo-bins/cargo-binstall@main
      - name: Install cargo-dist
        run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: dist plan
        id: plan
        run: |
          set -euo pipefail
          manifest="$(dist plan --tag "${RELEASE_TAG}" --output-format=json)"
          echo "$manifest" > dist-manifest.json
          echo "manifest<<EOF" >> "$GITHUB_OUTPUT"
          echo "$manifest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan
          path: dist-manifest.json

  build:
    name: Build ${{ matrix.target }}
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: cargo-bins/cargo-binstall@main
      - name: Install cargo-dist
        run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: Install musl toolchain
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: dist build
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: dist build --tag "${RELEASE_TAG}" --target ${{ matrix.target }}
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/distrib/*
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: target/distrib/
          if-no-files-found: error

  installers:
    name: Build installers
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-*
          merge-multiple: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: dist build installers
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: dist build --tag "${RELEASE_TAG}" --artifacts=global
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/distrib/plumb-cli*
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-installers
          path: target/distrib/

  publish:
    name: Publish release artifacts
    needs: [plan, build, installers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-*
          merge-multiple: true
      - name: List artifacts to upload
        run: ls -la target/distrib/
      - name: Upload artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          # Upload every file in target/distrib/ as a release asset.
          # `--clobber` lets us re-run this step against an existing
          # release (e.g. via workflow_dispatch retry).
          shopt -s nullglob
          assets=(target/distrib/plumb-cli-*.tar.xz \
                  target/distrib/plumb-cli-*.tar.xz.sha256 \
                  target/distrib/plumb-cli-*.zip \
                  target/distrib/plumb-cli-*.zip.sha256 \
                  target/distrib/plumb-cli-installer.* \
                  target/distrib/plumb-cli.rb \
                  target/distrib/plumb-cli-npm-package.tar.gz \
                  target/distrib/source.tar.gz \
                  target/distrib/source.tar.gz.sha256 \
                  target/distrib/sha256.sum)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No release assets found in target/distrib/"
            exit 1
          fi
          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber --repo "${GITHUB_REPOSITORY}"

  publish-homebrew:
    name: Publish Homebrew formula
    needs: [plan, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-installers
          merge-multiple: true
      - name: Push formula to aram-devdocs/homebrew-plumb
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f target/distrib/plumb-cli.rb ]; then
            echo "::error::plumb-cli.rb not found in target/distrib"
            ls -la target/distrib/
            exit 1
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/aram-devdocs/homebrew-plumb.git" tap
          mkdir -p tap/Formula

          # cargo-dist 0.28 emits the formula as `class PlumbCli` (matching the
          # `plumb-cli` cargo package name) but the tap install command is
          # `brew install aram-devdocs/plumb/plumb`, so the file is renamed to
          # `Formula/plumb.rb` and the class must be `Plumb` to match.
          cp target/distrib/plumb-cli.rb tap/Formula/plumb.rb
          sed -i 's/^class PlumbCli < Formula/class Plumb < Formula/' tap/Formula/plumb.rb

          # Inject sha256 fields after each url. cargo-dist 0.28 does not emit
          # them for the binary tap; brew audit flags missing checksums and a
          # MITM-tampered url would not be caught without them.
          python3 - "$RELEASE_TAG" tap/Formula/plumb.rb target/distrib <<'PY'
          import sys, re, pathlib
          tag, formula_path, distrib = sys.argv[1], sys.argv[2], pathlib.Path(sys.argv[3])
          text = pathlib.Path(formula_path).read_text()
          out = []
          for line in text.splitlines(keepends=True):
              out.append(line)
              m = re.match(r'(\s+)url "https://[^/]+/[^/]+/[^/]+/releases/download/[^/]+/([^"]+)"', line)
              if m:
                  indent, asset = m.group(1), m.group(2)
                  sidecar = distrib / f"{asset}.sha256"
                  if sidecar.exists():
                      digest = sidecar.read_text().strip().split()[0]
                      out.append(f'{indent}sha256 "{digest}"\n')
          pathlib.Path(formula_path).write_text("".join(out))
          PY

          # Inject Intel Mac fallback. cargo-dist's emitted formula assumes a
          # native binary exists for every platform in dist-workspace.toml's
          # `targets` list. x86_64-apple-darwin is intentionally absent (post-V0;
          # tracked at #269), so without an explicit `on_intel` `odie` block
          # `brew install` errors with a generic platform error instead of
          # pointing the user at `cargo install plumb-cli`.
          python3 - tap/Formula/plumb.rb <<'PY'
          import sys, pathlib
          path = pathlib.Path(sys.argv[1])
          text = path.read_text()
          if "on_intel do" in text:
              sys.exit(0)
          marker = "class Plumb < Formula\n"
          insert = (
              "  on_macos do\n"
              "    on_intel do\n"
              "      odie <<~EOS\n"
              "        Plumb does not yet ship native Intel Mac (x86_64) binaries.\n"
              "        Install via Cargo instead:\n"
              "\n"
              "          cargo install plumb-cli\n"
              "\n"
              "        Tracking: https://github.com/aram-devdocs/plumb/issues/269\n"
              "      EOS\n"
              "    end\n"
              "  end\n"
              "\n"
          )
          # Insert after the `desc/homepage/version/license` header block, just before
          # the first `if OS.mac?` or `on_macos`. The simplest reliable anchor is the
          # first `if OS.` line; insert before it.
          lines = text.splitlines(keepends=True)
          for i, line in enumerate(lines):
              if line.lstrip().startswith("if OS."):
                  lines.insert(i, insert)
                  break
          path.write_text("".join(lines))
          PY

          cd tap
          git add Formula/plumb.rb
          if git diff --cached --quiet; then
            echo "No formula changes for ${RELEASE_TAG}"
          else
            git commit -m "plumb ${RELEASE_TAG}"
            git push
          fi

  publish-npm:
    name: Publish npm package
    needs: [plan, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-installers
          merge-multiple: true
      - name: Strip wrong-arch Windows ARM64 npm mapping
        # cargo-dist 0.28.0 has no knob to filter `supportedPlatforms`. It
        # emits an `aarch64-pc-windows-msvc` entry that points to the x86_64
        # Windows zip, which would silently install the wrong arch on
        # Windows ARM. Repack the tarball without that entry until either
        # we ship a native Windows ARM64 target or cargo-dist exposes a
        # filter knob upstream.
        run: |
          set -euo pipefail
          tarball=target/distrib/plumb-cli-npm-package.tar.gz
          if [ ! -f "$tarball" ]; then
            echo "::error::$tarball not found"
            exit 1
          fi
          work=$(mktemp -d)
          tar -xzf "$tarball" -C "$work"
          pkg_dir=$(find "$work" -maxdepth 2 -name package.json -printf '%h\n' | head -n1)
          node -e '
            const fs = require("fs");
            const path = process.argv[1];
            const data = JSON.parse(fs.readFileSync(path, "utf8"));
            if (data.supportedPlatforms && data.supportedPlatforms["aarch64-pc-windows-msvc"]) {
              delete data.supportedPlatforms["aarch64-pc-windows-msvc"];
              fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
              console.log("stripped aarch64-pc-windows-msvc from supportedPlatforms");
            } else {
              console.log("no aarch64-pc-windows-msvc entry to strip; leaving package.json untouched");
            }
          ' "$pkg_dir/package.json"
          (cd "$(dirname "$pkg_dir")" && tar -czf "$GITHUB_WORKSPACE/$tarball" "$(basename "$pkg_dir")")
          rm -rf "$work"
      - name: Publish plumb-cli to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f target/distrib/plumb-cli-npm-package.tar.gz ]; then
            echo "::error::plumb-cli-npm-package.tar.gz not found in target/distrib"
            ls -la target/distrib/
            exit 1
          fi
          npm publish --access public target/distrib/plumb-cli-npm-package.tar.gz
