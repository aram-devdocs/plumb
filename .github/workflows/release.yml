name: release

# Triggered when release-please creates a tag. Builds cross-platform
# binaries via cargo-dist, generates installers, and attaches artifacts
# to the GitHub Release.
#
# This workflow is a hand-authored version of what `cargo dist init`
# would generate. It stays in sync with `dist-workspace.toml`. Re-run
# `cargo dist generate` locally and diff before editing.
#
# Cargo publish, curl installers, Homebrew tap publish, and npm publish are the non-manual release channels active in this repo today.
# The Homebrew formula push (to `aram-devdocs/homebrew-plumb` via the
# `HOMEBREW_TAP_TOKEN` repo secret) and the unscoped `plumb-cli` npm
# publish (via the `NPM_TOKEN` repo secret) are hand-authored here as
# the `publish-homebrew` and `publish-npm` jobs; cargo-dist's built-in
# publish-jobs require its auto-generated workflow, which we do not use.
# `dist-workspace.toml` enables npm by listing it in `installers` with
# `npm-scope` left unset; that emits `plumb-cli-npm-package.tar.gz` and
# publishes under the cargo package name (`plumb-cli`). Public install:
# `npm i -g plumb-cli`.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Manual fallback. release-please creates tags using GITHUB_TOKEN, which
  # GitHub will NOT use to trigger downstream `push` workflows (loop guard).
  # Use this dispatch (or set RELEASE_PLEASE_TOKEN to a PAT in
  # release-please.yml) when an automated tag push needs cargo-dist.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.0.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  # Resolves to the dispatch input on workflow_dispatch, or the pushed
  # tag name on tag push. Used as the cargo-dist `--tag` arg and the
  # checkout `ref` everywhere below.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ env.RELEASE_TAG }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: cargo-bins/cargo-binstall@main
      - name: Install cargo-dist
        run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: dist plan
        id: plan
        run: |
          set -euo pipefail
          manifest="$(dist plan --tag "${RELEASE_TAG}" --output-format=json)"
          echo "$manifest" > dist-manifest.json
          echo "manifest<<EOF" >> "$GITHUB_OUTPUT"
          echo "$manifest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan
          path: dist-manifest.json

  build:
    name: Build ${{ matrix.target }}
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: cargo-bins/cargo-binstall@main
      - name: Install cargo-dist
        run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: Install musl toolchain
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: dist build
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: dist build --tag "${RELEASE_TAG}" --target ${{ matrix.target }}
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/distrib/*
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: target/distrib/
          if-no-files-found: error

  installers:
    name: Build installers
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-*
          merge-multiple: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: dist build installers
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: dist build --tag "${RELEASE_TAG}" --artifacts=global
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/distrib/plumb-cli*
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-installers
          path: target/distrib/

  publish:
    name: Publish release artifacts
    needs: [plan, build, installers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-*
          merge-multiple: true
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: dist host
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: dist host --tag "${RELEASE_TAG}" --steps=upload --steps=release

  publish-homebrew:
    name: Publish Homebrew formula
    needs: [plan, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-installers
          merge-multiple: true
      - name: Push formula to aram-devdocs/homebrew-plumb
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          if [ ! -f target/distrib/plumb-cli.rb ]; then
            echo "::error::plumb-cli.rb not found in target/distrib"
            ls -la target/distrib/
            exit 1
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/aram-devdocs/homebrew-plumb.git" tap
          mkdir -p tap/Formula
          cp target/distrib/plumb-cli.rb tap/Formula/plumb.rb
          cd tap
          git add Formula/plumb.rb
          if git diff --cached --quiet; then
            echo "No formula changes for ${RELEASE_TAG}"
          else
            git commit -m "plumb ${RELEASE_TAG}"
            git push
          fi

  publish-npm:
    name: Publish npm package
    needs: [plan, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-installers
          merge-multiple: true
      - name: Publish plumb-cli to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f target/distrib/plumb-cli-npm-package.tar.gz ]; then
            echo "::error::plumb-cli-npm-package.tar.gz not found in target/distrib"
            ls -la target/distrib/
            exit 1
          fi
          npm publish --access public target/distrib/plumb-cli-npm-package.tar.gz
