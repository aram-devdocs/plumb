name: release

# Triggered when release-please creates a tag. Builds cross-platform
# binaries via cargo-dist, generates installers, and attaches artifacts
# to the GitHub Release.
#
# This workflow is a hand-authored version of what `cargo dist init`
# would generate. It stays in sync with `dist-workspace.toml`. Re-run
# `cargo dist generate` locally and diff before editing.
#
# Cargo publish, curl installers, Homebrew tap publish, and npm publish are the
# non-manual release channels active in this repo today. cargo-dist
# pushes the formula to `aram-devdocs/homebrew-plumb` using the
# `HOMEBREW_TAP_TOKEN` repo secret on each tag, and publishes the
# unscoped `plumb-cli` npm package using the `NPM_TOKEN` repo secret.
# `dist-workspace.toml` enables npm by listing it in `installers` with
# `npm-scope` left unset; that emits `plumb-cli-npm-package.tar.gz` and
# publishes under the cargo package name (`plumb-cli`). Public install:
# `npm i -g plumb-cli`.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Manual fallback. release-please creates tags using GITHUB_TOKEN, which
  # GitHub will NOT use to trigger downstream `push` workflows (loop guard).
  # Use this dispatch (or set RELEASE_PLEASE_TOKEN to a PAT in
  # release-please.yml) when an automated tag push needs cargo-dist.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.0.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  # Resolves to the dispatch input on workflow_dispatch, or the pushed
  # tag name on tag push. Used as the cargo-dist `--tag` arg and the
  # checkout `ref` everywhere below.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ env.RELEASE_TAG }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: cargo-bins/cargo-binstall@main
      - name: Install cargo-dist
        run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: dist plan
        id: plan
        run: |
          set -euo pipefail
          manifest="$(dist plan --tag "${RELEASE_TAG}" --output-format=json)"
          echo "$manifest" > dist-manifest.json
          echo "manifest<<EOF" >> "$GITHUB_OUTPUT"
          echo "$manifest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan
          path: dist-manifest.json

  build:
    name: Build ${{ matrix.target }}
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: cargo-bins/cargo-binstall@main
      - name: Install cargo-dist
        run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: Install musl toolchain
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: dist build
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: dist build --tag "${RELEASE_TAG}" --target ${{ matrix.target }}
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/distrib/*
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: target/distrib/
          if-no-files-found: error

  installers:
    name: Build installers
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-*
          merge-multiple: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: dist build installers
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: dist build --tag "${RELEASE_TAG}" --artifacts=global
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/distrib/plumb-installer.*
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-installers
          path: target/distrib/

  publish:
    name: Publish release artifacts
    needs: [plan, build, installers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v8
        with:
          path: target/distrib/
          pattern: artifacts-*
          merge-multiple: true
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --force --locked cargo-dist@0.28.0
      - name: dist host
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: dist host --tag "${RELEASE_TAG}" --steps=upload --steps=release
