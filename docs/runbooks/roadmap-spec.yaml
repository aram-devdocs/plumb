schema: https://plumb.aramhammoudeh.com/schemas/runbook-spec.json
name: "Plumb V0 → V1 roadmap"
repo: aram-devdocs/plumb

parent:
  title: "[ROADMAP] Plumb V0 → V1"
  labels: [roadmap, "kind:rfc"]
  summary: |
    Top-level delivery plan for Plumb from the walking-skeleton founding
    commit through V1 feature completion. Each phase is a sub-runbook
    of grouped child workstreams organized into sequential batches with
    a phase gate; phases unlock strictly in order.

    Scope coverage: every PRD item not shipped in the walking skeleton
    is assigned to a phase. Phase 1–6 is V0 (launch-ready release);
    Phase 7 collects V1 features marked for after V0 ships.

    Non-goals: auto-fix source, embedded Chromium, commercial SaaS
    positioning, CSS-in-JS runtime token extraction. IDE extensions
    and baseline-rhythm rule live in Phase 7 (V1), not silently
    deferred.
  acceptance_criteria:
    - "All 6 V0 phase-parent issues closed with their phase gates satisfied."
    - "`plumb lint https://plumb.aramhammoudeh.com` produces deterministic output from 8 MVP rules with zero false positives."
    - "`plumb` installable via cargo / brew / npm / curl, each verified."
    - "Phase 7 parent either closed or tracked as the V1 milestone with clear acceptance criteria."
  related_prd_sections: ["§6", "§7", "§10", "§11", "§12", "§13", "§14", "§15", "§16"]

batches:
  - id: "R"
    description: "Umbrella tracker — see body for the phase table"
    parallel: false
    issues:
      - slug: roadmap-self
        title: "chore(roadmap): umbrella tracker self-reference"
        labels: [roadmap, "kind:chore"]
        crate: docs
        effort: XS
        summary: |
          Synthetic child placeholder — the umbrella's body is rendered
          as a phase table, not as a checklist of individual child
          issues. This placeholder exists only to satisfy the runbook
          spec schema (which requires ≥1 issue per batch). Close this
          immediately after creation.
        acceptance_criteria:
          - "Closed immediately after creation."
        reviewers: ["02-spec-reviewer"]

phase_gate:
  criterion: |
    All 6 V0 phase parents closed with their phase gates satisfied.
    Phase 7 (V1) has a tracked milestone with clear acceptance criteria.
  unblocks: "(terminal roadmap)"
