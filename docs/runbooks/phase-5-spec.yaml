schema: https://plumb.aramhammoudeh.com/schemas/runbook-spec.json
name: "Phase 5 — Release distribution"
phase_number: 5
repo: aram-devdocs/plumb

parent:
  title: "[RUNBOOK] Phase 5 — Release distribution"
  labels: ["phase-5", "kind:rfc"]
  milestone: "v0.5-phase-5"
  summary: |
    Ship Plumb on every install channel: crates.io (`cargo install
    plumb-cli`), a Homebrew tap under `plumb-dev/homebrew-tap`, an npm
    wrapper under `@plumb/cli`, and a curl installer at
    `plumb.aramhammoudeh.com/install.sh`. Every release ships with SLSA-level-2
    attestations via cargo-dist.

    Prerequisite user chores (not tracked as issues): reserve the
    `plumb-dev` GitHub org, create the homebrew tap repo, reserve the
    `@plumb` npm org. The batch can start once these exist.
  acceptance_criteria:
    - "`cargo install plumb-cli` installs working `plumb` from crates.io."
    - "`brew install plumb-dev/tap/plumb` installs working `plumb` on macOS + Linux."
    - "`npm i -g @plumb/cli` installs working `plumb` cross-platform."
    - "`curl -LsSf https://plumb.aramhammoudeh.com/install.sh | sh` installs working `plumb`."
    - "Every GitHub Release has SLSA build-provenance attestations."
    - "All 6 child PRs merged."
  related_prd_sections: ["§15.1"]

batches:
  - id: "5A"
    description: "Registries + tap infra"
    parallel: true
    issues:
      - slug: release-crates-io-publish
        title: "chore(release): publish all 6 crates to crates.io"
        labels: ["phase-5", "area:release", "kind:chore"]
        crate: release
        effort: S
        prd_refs: ["§15.1"]
        summary: |
          Wire `release-please` + `cargo publish` to publish the 6
          workspace crates bottom-up (core → format → cdp → config →
          mcp → cli) on every tag.
        acceptance_criteria:
          - "Tag push triggers `release-please.yml` which triggers crates-io publish job."
          - "All 6 crates visible on crates.io."
          - "`CARGO_REGISTRY_TOKEN` configured as a repo secret."
        reviewers: ["02-spec-reviewer", "03-code-quality-reviewer", "05-architecture-validator", "04-test-runner", "06-security-auditor"]
      - slug: release-homebrew-tap-setup
        title: "feat(release): plumb-dev/homebrew-tap + cargo-dist wiring"
        labels: ["phase-5", "area:release", "kind:feat"]
        crate: release
        effort: M
        prd_refs: ["§15.1"]
        summary: |
          Create the `plumb-dev/homebrew-tap` repo, configure `cargo-dist`
          to publish a formula on every release, and verify `brew install
          plumb-dev/tap/plumb` works on macOS + Linux.
        acceptance_criteria:
          - "Homebrew tap repo exists with automated formula updates."
          - "`brew install plumb-dev/tap/plumb` installs on macOS arm64 + x86_64 and Linux."
          - "cargo-dist `tap` field uncommented in `dist-workspace.toml`."
        reviewers: ["02-spec-reviewer", "03-code-quality-reviewer", "05-architecture-validator", "04-test-runner"]
      - slug: release-npm-wrapper
        title: "feat(release): @plumb npm org + @plumb/cli wrapper package"
        labels: ["phase-5", "area:release", "kind:feat"]
        crate: release
        effort: M
        prd_refs: ["§15.1"]
        summary: |
          Publish `@plumb/cli` on npm as a thin wrapper that downloads
          the right platform binary on install. Managed by cargo-dist's
          npm installer feature.
        acceptance_criteria:
          - "`npm i -g @plumb/cli` installs on macOS / Linux / Windows."
          - "`NPM_TOKEN` configured as a repo secret."
          - "cargo-dist `npm-scope` field uncommented."
        reviewers: ["02-spec-reviewer", "03-code-quality-reviewer", "05-architecture-validator", "04-test-runner", "06-security-auditor"]

  - id: "5B"
    description: "Installer + attestations + smoke tests"
    parallel: true
    depends_on_batch: "5A"
    issues:
      - slug: release-install-sh
        title: "feat(release): plumb.aramhammoudeh.com/install.sh (curl one-liner)"
        labels: ["phase-5", "area:release", "kind:feat"]
        crate: release
        effort: S
        prd_refs: ["§15.1"]
        summary: |
          Serve `https://plumb.aramhammoudeh.com/install.sh` (generated by cargo-dist)
          from the docs site so the curl installer works cross-platform.
        acceptance_criteria:
          - "`curl -LsSf https://plumb.aramhammoudeh.com/install.sh | sh` installs on macOS / Linux."
          - "Installer verifies SHA256 against the release attestation."
          - "Windows variant documented (powershell `install.ps1`)."
        reviewers: ["02-spec-reviewer", "03-code-quality-reviewer", "05-architecture-validator", "04-test-runner", "06-security-auditor"]
      - slug: release-slsa-attestations
        title: "feat(release): GitHub Releases + SLSA L2 attestations"
        labels: ["phase-5", "area:release", "kind:feat"]
        crate: release
        effort: S
        prd_refs: ["§15.1"]
        summary: |
          Flip on `github-attestations = true` in `dist-workspace.toml`
          (already configured) and verify each release artifact carries
          a provenance attestation.
        acceptance_criteria:
          - "Every release asset has an attached attestation."
          - "`gh attestation verify` passes on each artifact."
          - "Docs page explains attestation verification to users."
        reviewers: ["02-spec-reviewer", "03-code-quality-reviewer", "05-architecture-validator", "04-test-runner", "06-security-auditor"]
      - slug: ci-install-matrix-smoke
        title: "test(ci): install-matrix smoke test (4 channels × 3 OSes)"
        labels: ["phase-5", "area:ci", "kind:test"]
        crate: ci
        effort: S
        summary: |
          Add a weekly CI job that installs Plumb via every channel on
          every supported OS and runs `plumb lint plumb-fake://hello`
          to confirm the install works end-to-end.
        acceptance_criteria:
          - "CI matrix covers {cargo, brew, npm, curl} × {macOS, Linux, Windows}."
          - "Failure opens an issue via `gh issue create`."
          - "Runs weekly + on release tag."
        reviewers: ["02-spec-reviewer", "03-code-quality-reviewer", "05-architecture-validator", "04-test-runner"]

phase_gate:
  criterion: |
    All four install channels verified working AND `gh attestation
    verify` passes on every release asset AND install-matrix smoke test
    green on a dogfood tag AND `cargo xtask pre-release` green.
  unblocks: "phase-6"
