# cargo-dist configuration.
#
# The companion release workflow is generated by `cargo dist init` in a
# later PR, once crate names are reserved on crates.io and the tap / npm
# scope exist. This file is here so `cargo dist plan` parses the repo on
# day one.

[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.28.0"
ci = ["github"]
installers = ["shell", "powershell"]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]
github-attestations = true
pr-run-mode = "plan"
allow-dirty = ["ci"]

# tap and npm-scope are intentionally commented out until the
# plumb-dev/homebrew-tap repo and @plumb npm org exist.
# tap = "plumb-dev/homebrew-tap"
# npm-scope = "@plumb"

[dist.github-custom-runners]
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
aarch64-unknown-linux-musl = "ubuntu-24.04-arm"
