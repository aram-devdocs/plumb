<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>plumb readiness typography fixture</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fcf9f4;
        color: #1b1713;
      }
      .serif {
        font-family: Georgia, "Times New Roman", serif;
      }
      .sans {
        font-family: "Trebuchet MS", Verdana, sans-serif;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 36px;
        line-height: 1.1;
        font-weight: 700;
      }
      h2 {
        margin: 24px 0 8px;
        font-size: 24px;
        line-height: 1.2;
        font-weight: 600;
      }
      p {
        margin: 0 0 12px;
        font-size: 16px;
        line-height: 1.5;
      }
      .meta {
        font-size: 13px;
        line-height: 1.3;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .weight-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }
      .weight-grid div {
        padding: 12px;
        border: 1px solid #c2b29c;
        background: #fffdf9;
      }
    </style>
  </head>
  <body>
    <main class="serif">
      <p class="meta sans">Offline typography kit</p>
      <h1>Measured type rhythm</h1>
      <p>Every face here comes from a local fallback stack. No web fonts are requested.</p>
      <h2 class="sans">Weight and family samples</h2>
      <div class="weight-grid sans">
        <div style="font-weight: 400;">Regular supporting copy</div>
        <div style="font-weight: 600;">Semibold supporting copy</div>
        <div style="font-weight: 700;">Bold supporting copy</div>
      </div>
    </main>
  </body>
</html>
